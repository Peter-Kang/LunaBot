name: Release On Main PR Closed
run-name: ${{ github.repository }} PR into Main Run Attempt ${{ github.run_attempt }}
on: 
  pull_request:
    branches:
      -main
    types: [closed]
jobs:
  if_merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR Merged"
